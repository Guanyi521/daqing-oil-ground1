# Stage 2: Transformer LLM 时空推演配置

# 数据配置
data:
  data_dir: "dataset/transformer_offline_tokens"
  nt_width: 10      # 滑动窗口时间步长度
  stride: 1         # 滑动步长
  Ld: 500           # 展平后的空间序列长度 (如 10x10x5=500)

# Transformer 模型架构
model:
  vocab_size: 1025   # VQ 密码本大小 (Codebook 词表大小 + 1 Padding 占位符)
  d_model: 512      # 隐藏层维度
  num_heads: 8      # 自注意力头数
  head_splits: [8, 8] # 多模态交叉融合头数 (地质, 井控)
  num_layers: 6     # Transformer 堆叠层数
  hidden_dim: 2048  # FFN 维度 (d_model * 4)
  max_nt_width: 50  # 预注册 Block Causal Mask 的最大支持长度

# 训练控制
training:
  batch_size: 4     # 单卡 Batch Size
  accumulate_grad_batches: 4 # 梯度累加，模拟大 Batch
  max_epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 0.01
  devices: 1
  use_amp: true
  num_workers: 8
  save_dir: "checkpoints/stage2"
  log_dir: "log/stage2"